{% extends "base.html" %}

{% block title %}{{ title }} | A kids India{% endblock %}

{% block content %}
<section class="bg-gradient-to-br from-butter/30 via-background to-sea/10 py-16 md:py-24">
    <div class="max-w-4xl mx-auto px-margin-desktop">
        <p class="text-tangerine font-label-md text-xs uppercase tracking-[0.2em] font-bold mb-4">{{ eyebrow }}</p>
        <h1 class="font-display-lg text-4xl md:text-6xl text-on-surface mb-6">{{ title }}</h1>
        <p class="text-on-surface-variant text-lg md:text-xl leading-relaxed max-w-3xl">{{ intro }}</p>
    </div>
</section>

<section class="py-16 md:py-24">
    <div class="max-w-4xl mx-auto px-margin-desktop space-y-6">
        {% for heading, copy in sections %}
        <article class="bg-white rounded-2xl border border-outline-variant/20 p-7 md:p-9 shadow-sm">
            <h2 class="font-display-lg text-2xl text-on-surface mb-3">{{ heading }}</h2>
            <p class="text-on-surface-variant leading-relaxed">{{ copy }}</p>
        </article>
        {% endfor %}
    </div>
</section>
{% endblock %}
