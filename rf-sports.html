<!DOCTYPE html>

<head>

  <meta name="description" content="Akids RF Sports catalogue coming soon.">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">
  <style>
    .coming-soon-hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(135deg, var(--color-coming-soon) 0%, #8E44AD 100%);
      color: white;
      padding-top: 72px;
    }
    .coming-soon-content i {
      font-size: 5rem;
      margin-bottom: 24px;
      opacity: 0.9;
    }
    .coming-soon-content h1 {
      color: white;
      font-size: 4rem;
      margin-bottom: 16px;
    }
    .coming-soon-content p {
      font-size: 1.25rem;
      max-width: 600px;
      margin: 0 auto 32px;
      opacity: 0.9;
    }
    .email-notify {
      display: flex;
      max-width: 400px;
      margin: 0 auto;
      background: rgba(255,255,255,0.1);
      padding: 8px;
      border-radius: var(--radius-full);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .email-notify input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      padding: 10px 20px;
      outline: none;
    }
    .email-notify input::placeholder {
      color: rgba(255,255,255,0.6);
    }
    .email-notify button {
      background: white;
      color: var(--color-coming-soon);
      padding: 10px 24px;
      border-radius: var(--radius-full);
      font-weight: 700;
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="main-nav" id="mainNav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <i class="fa-solid fa-shapes"></i>
        <span>Akids</span>
      </a>
      
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="indoor.html">Indoor</a>
        <a href="outdoor.html">Outdoor</a>
        <a href="parts.html">Parts</a>
        <a href="rf-sports.html" class="nav-rf-link active">RF Sports <span class="coming-soon-pill">Soon</span></a>
      </div>
      
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <i class="fa-solid fa-bars"></i>
      </button>
    </div>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <button class="mobile-menu-close" id="mobileClose" aria-label="Close menu">

    <a href="parts.html">Parts & Components</a>
    <a href="rf-sports.html" style="color: var(--color-muted);">RF Sports <span class="coming-soon-pill">Soon</span></a>
  </div>

  <!-- Hero Section -->
  <main class="coming-soon-hero">
    <div class="container coming-soon-content reveal-scale">
      <i class="fa-solid fa-volleyball"></i>
      <h1>RF Sports</h1>
      <p>We are currently building an extensive catalogue for professional sports equipment, court surfacing, and athletic gear. Stay tuned!</p>
      
      <div class="email-notify">
        <input type="email" placeholder="Enter your email to get notified" aria-label="Email address">
        <button type="button">Notify Me</button>
      </div>
      
      <div style="margin-top: 48px;">
        <a href="index.html" class="btn btn-outline" style="color: white; border-color: white;">
          <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>
      </div>
    </div>

  <script src="js/main.js"></script>
