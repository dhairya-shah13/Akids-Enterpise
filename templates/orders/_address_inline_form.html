<!-- Inline address form fragment for checkout page -->
<div class="auth-form">
  <div class="form-row">
    <div class="form-group">
      <label>Label</label>
      {{ address_form.label }}
    </div>
    <div class="form-group">
      <label>Recipient Name</label>
      {{ address_form.full_name }}
    </div>
  </div>
  <div class="form-group">
    <label>Phone</label>
    {{ address_form.phone }}
  </div>
  <div class="form-group">
    <label>Address Line 1</label>
    {{ address_form.line1 }}
  </div>
  <div class="form-group">
    <label>Address Line 2 (optional)</label>
    {{ address_form.line2 }}
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>City</label>
      {{ address_form.city }}
    </div>
    <div class="form-group">
      <label>State</label>
      {{ address_form.state }}
    </div>
    <div class="form-group">
      <label>Pincode</label>
      {{ address_form.pincode }}
    </div>
  </div>
</div>
