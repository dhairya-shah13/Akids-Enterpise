<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Payment | Akids</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .payment-card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      max-width: 500px;
      width: 100%;
      padding: 48px 40px;
      text-align: center;
    }
    .lock-icon {
      font-size: 3rem;
      color: #9CA3AF;
      margin-bottom: 16px;
    }
    .payment-heading {
      font-size: 1.5rem;
      font-weight: 700;
      color: #6B7280;
      margin-bottom: 32px;
    }
    .order-info {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .order-number {
      font-size: 0.9rem;
      color: #6B7280;
      margin-bottom: 8px;
    }
    .order-total {
      font-size: 2.5rem;
      font-weight: 700;
      color: #1A1A2E;
    }
    .dev-banner {
      background: #FFF3CD;
      color: #856404;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .payment-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    .pay-btn {
      padding: 16px 24px;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .pay-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
    .pay-btn:active { transform: translateY(0); }
    .pay-success {
      background: #2ECC71;
      color: white;
    }
    .pay-failure {
      background: #E74C3C;
      color: white;
    }
    .countdown {
      font-size: 0.85rem;
      color: #9CA3AF;
      margin-bottom: 16px;
    }
    .countdown-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #9CA3AF;
      cursor: pointer;
    }
    .countdown-toggle input { cursor: pointer; }
  </style>
</head>
<body>
  <div class="payment-card">
    <div class="lock-icon">
      <i class="fa-solid fa-lock"></i>
    </div>
    <h1 class="payment-heading">Secure Simulated Payment</h1>

    <div class="order-info">
      <div class="order-number">Order: {{ order.order_number }}</div>
      <div class="order-total">₹{{ order.total|floatformat:0 }}</div>
    </div>

    <div class="dev-banner">
      <span>⚠️</span>
      <span>Development Mode — No real payment will be processed</span>
    </div>

    <div class="countdown" id="countdownText">
      Auto-simulating success in <span id="countdownNum">3</span>…
    </div>

    <label class="countdown-toggle">
      <input type="checkbox" id="autoSimToggle" checked>
      <span>Auto-simulate payment</span>
    </label>

    <form method="post" action="{% url 'orders:payment_process' order.order_number %}" id="paymentForm" style="margin-top: 24px;">
      {% csrf_token %}
      <input type="hidden" name="result" id="paymentResult" value="success">
      <div class="payment-buttons">
        <button type="submit" class="pay-btn pay-success" id="successBtn" onclick="document.getElementById('paymentResult').value='success';">
          ✅ Simulate Success
        </button>
        <button type="submit" class="pay-btn pay-failure" onclick="document.getElementById('paymentResult').value='failure';">
          ❌ Simulate Failure
        </button>
      </div>
    </form>
  </div>

  <script>
    // Auto-countdown timer
    let countdown = 3;
    let timer = null;
    const countdownNum = document.getElementById('countdownNum');
    const countdownText = document.getElementById('countdownText');
    const autoToggle = document.getElementById('autoSimToggle');
    const successBtn = document.getElementById('successBtn');

    function startCountdown() {
      countdown = 3;
      countdownNum.textContent = countdown;
      countdownText.style.display = 'block';
      timer = setInterval(() => {
        countdown--;
        countdownNum.textContent = countdown;
        if (countdown <= 0) {
          clearInterval(timer);
          // Auto-click success
          document.getElementById('paymentResult').value = 'success';
          document.getElementById('paymentForm').submit();
        }
      }, 1000);
    }

    function stopCountdown() {
      if (timer) clearInterval(timer);
      countdownText.style.display = 'none';
    }

    // Toggle auto-sim
    autoToggle.addEventListener('change', () => {
      if (autoToggle.checked) {
        startCountdown();
      } else {
        stopCountdown();
      }
    });

    // Start on load
    startCountdown();
  </script>
</body>
</html>
